<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Data KTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>

        :root {
            --navy:        #0f2d5e;
            --blue:        #1a4a9c;
            --blue-mid:    #2560c8;
            --blue-soft:   #deeaff;
            --blue-xsoft:  #f0f5ff;
            --gold:        #f5c400;
            --gold-dark:   #c89e00;
            --gold-soft:   #fffbe6;
            --white:       #ffffff;
            --bg:          #f0f4fb;
            --surface:     #f8faff;
            --text-1:      #0d1b35;
            --text-2:      #3a4a6b;
            --text-3:      #7a8aaa;
            --border:      #cdd9f0;
            --border-soft: #e4ecf9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            font-family: 'DM Sans', 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        .layout {
            display: flex;
            min-height: 100vh;
            justify-content: center;
        }

        .sidebar {
            width: 5px;
            background: linear-gradient(180deg, var(--gold) 0%, var(--blue-mid) 50%, var(--navy) 100%);
            flex-shrink: 0;
        }

        .main {
            flex: 1;
            padding: 36px 28px 60px;
            max-width: 960px;
            margin: 0 auto;
        }

        .section-label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .section-label .sl-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--navy);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .section-label .sl-icon svg { display: block; }

        .section-label .sl-text h2 {
            font-size: 14px;
            font-weight: 700;
            color: var(--navy);
            line-height: 1;
        }

        .section-label .sl-text p {
            font-size: 11.5px;
            color: var(--text-3);
            margin-top: 2px;
        }

        .form-panel {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 36px;
        }

        .form-panel-top {
            background: var(--navy);
            padding: 0;
            display: flex;
        }

        .form-panel-tab {
            padding: 13px 24px;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            border-bottom: 3px solid transparent;
            cursor: default;
        }

        .form-panel-tab.active {
            color: var(--white);
            border-bottom-color: var(--gold);
        }

        .form-panel-body {
            padding: 26px 28px 28px;
        }

        .field-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-bottom: 18px;
        }

        .field-group.single { grid-template-columns: 1fr; }

        .field { display: flex; flex-direction: column; }

        .field label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-3);
            margin-bottom: 6px;
        }

        .field .field-hint {
            font-size: 10.5px;
            color: #aab8d4;
            margin-bottom: 6px;
            margin-top: -4px;
        }

        .form-control, .form-select {
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 9px 13px;
            font-size: 13.5px;
            font-family: inherit;
            color: var(--text-1);
            background: var(--surface);
            transition: border-color 0.15s, box-shadow 0.15s;
            box-shadow: none;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--blue-mid);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(37,96,200,0.10);
            outline: none;
        }

        .form-control::placeholder { color: #c0cce4; }

        .form-footer {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-top: 6px;
            border-top: 1px solid var(--border-soft);
            margin-top: 6px;
        }

        .btn-simpan {
            background: var(--blue);
            color: var(--white);
            border: none;
            border-radius: 8px;
            padding: 9px 24px;
            font-size: 13.5px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: background 0.15s;
        }

        .btn-simpan:hover { background: var(--navy); }

        .btn-simpan .dot-icon {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--gold);
            flex-shrink: 0;
        }

        .btn-batal {
            background: transparent;
            color: var(--text-3);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 9px 18px;
            font-size: 13.5px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }

        .btn-batal:hover { border-color: var(--blue-mid); color: var(--blue-mid); }

        .table-panel {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }

        .table-panel-head {
            background: var(--navy);
            padding: 14px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .table-panel-head .th-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-panel-head .th-left .gold-line {
            width: 3px;
            height: 18px;
            background: var(--gold);
            border-radius: 2px;
        }

        .table-panel-head .th-left span {
            font-size: 14px;
            font-weight: 700;
            color: var(--white);
        }

        .table-panel-head .th-right {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            font-weight: 500;
        }

        .ktp-table { width: 100%; border-collapse: collapse; }

        .ktp-table thead tr {
            background: var(--blue-xsoft);
        }

        .ktp-table thead th {
            padding: 11px 16px;
            font-size: 10.5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.9px;
            color: var(--blue-mid);
            border-bottom: 1.5px solid var(--blue-soft);
            white-space: nowrap;
        }

        .ktp-table thead th:first-child { padding-left: 20px; }

        .ktp-table tbody td {
            padding: 13px 16px;
            font-size: 13px;
            color: var(--text-2);
            border-bottom: 1px solid var(--border-soft);
            vertical-align: middle;
        }

        .ktp-table tbody td:first-child { padding-left: 20px; }

        .ktp-table tbody tr:last-child td { border-bottom: none; }

        .ktp-table tbody tr:hover td { background: var(--blue-xsoft); }

        .noktp-chip {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: 700;
            color: var(--navy);
            background: var(--blue-soft);
            padding: 3px 8px;
            border-radius: 5px;
            letter-spacing: 0.5px;
        }

        .nama-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nama-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--navy);
            color: var(--gold);
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            letter-spacing: 0.5px;
        }

        .nama-text {
            font-weight: 600;
            color: var(--text-1);
            font-size: 13.5px;
        }

        .alamat-cell {
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-3);
            font-size: 12.5px;
        }

        .tgl-cell {
            font-size: 12.5px;
            color: var(--text-2);
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px 3px 7px;
            border-radius: 20px;
            font-size: 11.5px;
            font-weight: 700;
        }

        .pill-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .pill-laki {
            background: var(--blue-soft);
            color: var(--blue);
        }

        .pill-laki .pill-dot { background: var(--blue-mid); }

        .pill-perempuan {
            background: #fde8f5;
            color: #8a1f6a;
        }

        .pill-perempuan .pill-dot { background: #c0408a; }

        .aksi-cell { display: flex; gap: 6px; }

        .act-edit {
            background: var(--gold-soft);
            color: var(--gold-dark);
            border: 1px solid #e8d060;
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 11.5px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.13s;
        }

        .act-edit:hover { background: #fff0b0; }

        .act-hapus {
            background: #fff3f3;
            color: #c0201f;
            border: 1px solid #f5c0c0;
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 11.5px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.13s;
        }

        .act-hapus:hover { background: #ffe0e0; }

        .empty-row td {
            text-align: center;
            padding: 52px 20px;
        }

        .empty-inner {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .empty-inner .empty-icon-box {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--blue-soft);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-inner p {
            font-size: 13px;
            color: var(--text-3);
            font-weight: 500;
        }

        .btn-update {
            background: #0f7a3a !important;
            border: none !important;
            border-radius: 8px;
            padding: 9px 24px;
            font-size: 13.5px;
            font-weight: 700;
            font-family: inherit;
            color: white;
            cursor: pointer;
        }

        .btn-update:hover { background: #0a5c2b !important; }

        @media (max-width: 600px) {
            .field-group { grid-template-columns: 1fr; }
            .main { padding: 24px 14px 40px; }
        }

    </style>
</head>
<body>

<div class="layout">
    <div class="sidebar"></div>
    <div class="main">

        <div class="section-label">
            <div class="sl-icon">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <rect x="2" y="4" width="12" height="9" rx="1.5" stroke="#f5c400" stroke-width="1.5"/>
                    <path d="M5 4V3.5A2.5 2.5 0 0 1 11 3.5V4" stroke="#f5c400" stroke-width="1.5"/>
                    <path d="M5 8h6M5 11h4" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="sl-text">
                <h2>Input Data Penduduk</h2>
                <p>Isi formulir untuk menambahkan atau memperbarui data</p>
            </div>
        </div>

        <div class="form-panel">
            <div class="form-panel-top">
                <div class="form-panel-tab active" id="formTitle">Tambah Data KTP</div>
            </div>
            <div class="form-panel-body">
                <form id="ktpForm">
                    <input type="hidden" id="ktpId">

                    <div class="field-group">
                        <div class="field">
                            <label>Nomor KTP</label>
                            <div class="field-hint">16 digit angka sesuai dokumen</div>
                            <input type="text" id="nomorKtp" class="form-control" placeholder="Contoh: 3276051234567890" required>
                        </div>
                        <div class="field">
                            <label>Nama Lengkap</label>
                            <div class="field-hint">Sesuai identitas resmi</div>
                            <input type="text" id="namaLengkap" class="form-control" placeholder="Nama lengkap tanpa singkatan" required>
                        </div>
                    </div>

                    <div class="field-group single">
                        <div class="field">
                            <label>Alamat Lengkap</label>
                            <textarea id="alamat" class="form-control" rows="2" placeholder="Jalan, RT/RW, Kelurahan, Kecamatan, Kota..."></textarea>
                        </div>
                    </div>

                    <div class="field-group">
                        <div class="field">
                            <label>Tanggal Lahir</label>
                            <input type="date" id="tanggalLahir" class="form-control" required>
                        </div>
                        <div class="field">
                            <label>Jenis Kelamin</label>
                            <select id="jenisKelamin" class="form-select" required>
                                <option value="" selected disabled>— Pilih Gender —</option>
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-footer">
                        <button type="submit" class="btn-simpan" id="btnSubmit">
                            <span class="dot-icon"></span>
                            Simpan Data
                        </button>
                        <button type="button" class="btn-batal d-none" id="btnCancel" onclick="resetForm()">Batal</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="section-label">
            <div class="sl-icon">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <rect x="2" y="2" width="12" height="12" rx="2" stroke="#f5c400" stroke-width="1.5"/>
                    <path d="M2 6h12M6 6v8" stroke="white" stroke-width="1.2"/>
                </svg>
            </div>
            <div class="sl-text">
                <h2>Daftar Penduduk Terdaftar</h2>
                <p>Data yang tersimpan di sistem</p>
            </div>
        </div>

        <div class="table-panel">
            <div class="table-panel-head">
                <div class="th-left">
                    <div class="gold-line"></div>
                    <span>Rekap Data KTP</span>
                </div>
                <div class="th-right">Data Kependudukan</div>
            </div>
            <div style="overflow-x:auto">
                <table class="ktp-table">
                    <thead>
                    <tr>
                        <th>No. KTP</th>
                        <th>Nama Penduduk</th>
                        <th>Alamat</th>
                        <th>Tgl. Lahir</th>
                        <th>Gender</th>
                        <th>Aksi</th>
                    </tr>
                    </thead>
                    <tbody id="ktpTableBody"></tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script>
    const API_URL = "/ktp";

    $(document).ready(function() {
        loadData();

        $('#ktpForm').on('submit', function(e) {
            e.preventDefault();

            const id = $('#ktpId').val();
            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            const payload = {
                nomorKtp: $('#nomorKtp').val(),
                namaLengkap: $('#namaLengkap').val(),
                alamat: $('#alamat').val(),
                tanggalLahir: $('#tanggalLahir').val(),
                jenisKelamin: $('#jenisKelamin').val()
            };

            $.ajax({
                url: url,
                type: method,
                contentType: "application/json",
                data: JSON.stringify(payload),
                success: function(response) {
                    alert(id ? "Data berhasil diperbarui!" : "Data berhasil ditambahkan!");
                    resetForm();
                    loadData();
                },
                error: function(err) {
                    alert("Gagal: " + (err.responseJSON ? err.responseJSON.message : "Terjadi kesalahan sistem"));
                }
            });
        });
    });

    function loadData() {
        $.get(API_URL, function(response) {
            let rows = '';
            if (response.data.length === 0) {
                rows = `<tr class="empty-row"><td colspan="6">
                    <div class="empty-inner">
                        <div class="empty-icon-box">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <rect x="3" y="5" width="14" height="11" rx="2" stroke="#2560c8" stroke-width="1.5"/>
                                <path d="M7 5V4a3 3 0 0 1 6 0v1" stroke="#2560c8" stroke-width="1.5"/>
                                <path d="M7 10h6M7 13h4" stroke="#2560c8" stroke-width="1.3" stroke-linecap="round"/>
                            </svg>
                        </div>
                        <p>Belum ada data penduduk terdaftar</p>
                    </div>
                </td></tr>`;
            } else {
                response.data.forEach(item => {
                    const initials = item.namaLengkap.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
                    const pillClass = item.jenisKelamin === 'Laki-laki' ? 'pill-laki' : 'pill-perempuan';
                    rows += `
                        <tr>
                            <td><span class="noktp-chip">${item.nomorKtp}</span></td>
                            <td>
                                <div class="nama-cell">
                                    <div class="nama-avatar">${initials}</div>
                                    <span class="nama-text">${item.namaLengkap}</span>
                                </div>
                            </td>
                            <td><span class="alamat-cell" title="${item.alamat}">${item.alamat}</span></td>
                            <td><span class="tgl-cell">${item.tanggalLahir}</span></td>
                            <td>
                                <span class="pill ${pillClass}">
                                    <span class="pill-dot"></span>
                                    ${item.jenisKelamin}
                                </span>
                            </td>
                            <td>
                                <div class="aksi-cell">
                                    <button class="act-edit" onclick="editData(${item.id})">Edit</button>
                                    <button class="act-hapus" onclick="deleteData(${item.id})">Hapus</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            }
            $('#ktpTableBody').html(rows);
        });
    }

    function editData(id) {
        $.get(`${API_URL}/${id}`, function(response) {
            const d = response.data;
            $('#ktpId').val(d.id);
            $('#nomorKtp').val(d.nomorKtp);
            $('#namaLengkap').val(d.namaLengkap);
            $('#alamat').val(d.alamat);
            $('#tanggalLahir').val(d.tanggalLahir);
            $('#jenisKelamin').val(d.jenisKelamin);

            $('#formTitle').text("Ubah Data KTP");
            $('#btnSubmit').text("Perbarui Data").addClass('btn-update');
            $('#btnCancel').removeClass('d-none');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }

    function deleteData(id) {
        if (confirm("Apakah Anda yakin ingin menghapus data ini?")) {
            $.ajax({
                url: `${API_URL}/${id}`,
                type: 'DELETE',
                success: function() {
                    alert("Data berhasil dihapus!");
                    loadData();
                },
                error: function() {
                    alert("Gagal menghapus data.");
                }
            });
        }
    }

    function resetForm() {
        $('#ktpId').val('');
        $('#ktpForm')[0].reset();
        $('#formTitle').text("Tambah Data KTP");
        $('#btnSubmit').text("Simpan Data").removeClass('btn-update');
        $('#btnCancel').addClass('d-none');
    }
</script>

</body>
</html>
